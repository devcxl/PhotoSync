<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="512" height="512" rx="64" fill="#F7F4EE"/>

  <!-- 灰色外圆环：顺时针，右下为头部 -->
  <path
    d="M 353.5 412.0
       A 184 184 0 1 1 408.5 358.9"
    fill="none"
    stroke="#D4D4D4"
    stroke-width="22"
    stroke-linecap="round"
  />

  <!-- 右下箭头：接在圆环终点，表示顺时针头部 -->
  <path
    d="M 408 333.0
       L 408.5 358.9
       L 431.5 346"
    fill="none"
    stroke="#D4D4D4"
    stroke-width="22"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- 中心蓝色圆 -->
  <circle
    cx="256"
    cy="256"
    r="144"
    fill="#3F7FDC"
  />

  <!-- 右上红点 -->
  <circle
    cx="428"
    cy="75"
    r="21"
    fill="#EA4335"
  />
</svg>
